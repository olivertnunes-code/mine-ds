name: Build Mine DS Game
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Compile the game
        run: |
          # Automatically search for the folder containing the Makefile
          MAKEFILE_DIR=$(find . -name "Makefile" -exec dirname {} \;)
          if [ -n "$MAKEFILE_DIR" ]; then
            echo "Found Makefile in: $MAKEFILE_DIR"
            cd "$MAKEFILE_DIR"
            make clean
            make
          else
            echo "ERROR: Makefile not found anywhere in the repository!"
            exit 1
          fi

      - name: Upload Completed NDS File
        uses: actions/upload-artifact@v4
        with:
          name: ZombieFree-MineDS
          path: |
            ./*.nds
            ./**/*.nds
